<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hammer Golf Calculator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f5;color:#111;font-size:15px}
.wrap{max-width:420px;margin:0 auto;padding:16px}
h1{font-size:22px;font-weight:600;color:#1a6b3a;margin-bottom:2px}
.sub{font-size:13px;color:#888;margin-bottom:20px}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;border:1px solid #e5e5e5}
label{display:block;font-size:12px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
input,select{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:15px;background:#fff;color:#111}

/* Flex Button Group */
.selector-group {display: flex; gap: 8px; margin-bottom: 14px;}
.sel-btn {flex: 1; padding: 10px; border: 1.5px solid #ddd; background: #fff; border-radius: 8px; cursor: pointer; font-weight: 600; color: #666; transition: 0.2s;}
.sel-btn.active {border-color: #1a6b3a; background: #eef7f2; color: #1a6b3a;}

.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:6px}
.btn-primary{background:#1a6b3a;color:#fff}
.btn-secondary{background:#fff;color:#1a6b3a;border:1.5px solid #1a6b3a;margin-top:10px}

.player-row{display:flex; justify-content: space-between; align-items:center; margin-bottom:12px; padding-bottom: 12px; border-bottom: 1px solid #f9f9f9;}
.player-row:last-child {border-bottom: none; margin-bottom: 0;}
.player-label {font-weight: 600; color: #333;}
.player-input-wrap {width: 100px;}

.results-table{width:100%;border-collapse:collapse;font-size:14px}
.results-table th{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.4px;padding:6px 8px;border-bottom:1.5px solid #eee;text-align:left}
.results-table th:last-child,.results-table td:last-child{text-align:right}
.results-table th:nth-child(2),.results-table td:nth-child(2){text-align:center}
.results-table th:nth-child(3),.results-table td:nth-child(3){text-align:center}
.results-table td{padding:10px 8px;border-bottom:1px solid #f5f5f5;font-size:15px}
.results-table tr:last-child td{border-bottom:none}
.pos{color:#1a6b3a;font-weight:600}
.neg{color:#c0392b;font-weight:600}
.zero{color:#888}
.winner-row{background:#f0faf4}
.big-name{font-weight:600;font-size:15px}
.section-title{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.ledger-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f5f5f5}
.ledger-row:last-child{border-bottom:none}
.ledger-amt{font-weight:700;font-size:16px;color:#c0392b}
.sum-row{font-size:12px;color:#aaa;text-align:center;padding-top:6px}
</style>
</head>
<body>
<div class="wrap">
  <h1>Hammer</h1>
  <p class="sub">Golf bean calculator</p>

  <div class="card">
    <label>Number of players</label>
    <div class="selector-group">
        <button class="sel-btn" onclick="setPlayers(3)" id="btn-3">3</button>
        <button class="sel-btn active" onclick="setPlayers(4)" id="btn-4">4</button>
        <button class="sel-btn" onclick="setPlayers(5)" id="btn-5">5</button>
    </div>

    <label>Point value ($)</label>
    <input type="number" id="point-val" value="0.25" min="0.05" step="0.05">
  </div>

  <div class="card">
    <div class="section-title">Enter Beans</div>
    <div id="player-inputs"></div>
  </div>

  <button class="btn btn-primary" onclick="calculate()">Calculate</button>

  <div id="results" style="display:none">
    <div class="card" style="margin-top:14px">
      <div class="section-title">Results</div>
      <table class="results-table">
        <thead>
          <tr><th>Player</th><th>Beans</th><th>Total</th><th>Owes</th></tr>
        </thead>
        <tbody id="results-body"></tbody>
      </table>
      <div class="sum-row" id="sum-check"></div>
    </div>

    <div class="card">
      <div class="section-title">Who pays whom</div>
      <div id="ledger"></div>
    </div>

    <button class="btn btn-secondary" onclick="reset()">Clear All</button>
  </div>
</div>

<script>
let playerCount = 4;

function setPlayers(n) {
    playerCount = n;
    // Update UI buttons
    [3,4,5].forEach(num => {
        document.getElementById(`btn-${num}`).classList.toggle('active', num === n);
    });
    renderPlayers();
}

function renderPlayers(){
  const el=document.getElementById('player-inputs');
  el.innerHTML='';
  for(let i=0; i < playerCount; i++){
    el.innerHTML+=`
    <div class="player-row">
      <div class="player-label">Player ${i+1}</div>
      <div class="player-input-wrap">
        <input type="number" id="beans-${i}" placeholder="0" min="0" value="">
      </div>
    </div>`;
  }
}

function calculate(){
  const pv=parseFloat(document.getElementById('point-val').value)||0.25;
  const beans=[];
  const names=[];

  for(let i=0; i < playerCount; i++){
    names.push('Player ' + (i+1));
    beans.push(parseFloat(document.getElementById('beans-'+i).value)||0);
  }

  const totalSum = beans.reduce((a, b) => a + b, 0);

  // Logic: (n * b) - totalSum
  const totals = beans.map(b => (playerCount * b) - totalSum);
  const owes = totals.map(t => t * pv);
  const sumCheck = owes.reduce((s, x) => s + x, 0);

  const tbody = document.getElementById('results-body');
  tbody.innerHTML = '';

  const indices = [...Array(playerCount).keys()];
  const sorted = indices.sort((a, b) => totals[b] - totals[a]);

  sorted.forEach(i => {
    const t = totals[i], o = owes[i];
    const tCls = t > 0 ? 'pos' : t < 0 ? 'neg' : 'zero';
    const oCls = o > 0 ? 'pos' : o < 0 ? 'neg' : 'zero';
    const winner = i === sorted[0] && t > 0 ? ' winner-row' : '';

    tbody.innerHTML += `
    <tr class="${winner}">
      <td class="big-name">${names[i]}</td>
      <td style="text-align:center">${beans[i]}</td>
      <td class="${tCls}" style="text-align:center">${t > 0 ? '+' : ''}${t}</td>
      <td class="${oCls}">${o >= 0 ? '+$' : '−$'}${Math.abs(o).toFixed(2)}</td>
    </tr>`;
  });

  document.getElementById('sum-check').textContent =
    Math.abs(sumCheck) < 0.01 ? '✓ All totals sum to zero' : '⚠ Check your bean counts';

  // Settle payments
  const debtors = names.map((_,i) => ({i, a: owes[i]})).filter(x => x.a < -0.004).sort((a,b) => a.a - b.a);
  const creditors = names.map((_,i) => ({i, a: owes[i]})).filter(x => x.a > 0.004).sort((a,b) => b.a - a.a);
  const txns = [];
  let di=0, ci=0;

  while(di < debtors.length && ci < creditors.length) {
    const amt = Math.min(-debtors[di].a, creditors[ci].a);
    if(amt > 0.004) txns.push({from: debtors[di].i, to: creditors[ci].i, amt});
    debtors[di].a += amt;
    creditors[ci].a -= amt;
    if(Math.abs(debtors[di].a) < 0.004) di++;
    if(Math.abs(creditors[ci].a) < 0.004) ci++;
  }

  const ledger = document.getElementById('ledger');
  if(txns.length === 0){
    ledger.innerHTML = '<p class="zero-msg">All square — no payments needed!</p>';
  } else {
    ledger.innerHTML = txns.map(t => `
      <div class="ledger-row">
        <span>${names[t.from]}</span>
        <span style="color:#aaa;font-size:13px">pays ${names[t.to]}</span>
        <span class="ledger-amt">$${t.amt.toFixed(2)}</span>
      </div>`).join('');
  }

  document.getElementById('results').style.display = 'block';
  document.getElementById('results').scrollIntoView({behavior: 'smooth'});
}

function reset(){
  document.getElementById('results').style.display = 'none';
  renderPlayers();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

renderPlayers();
</script>
</body>
</html>
